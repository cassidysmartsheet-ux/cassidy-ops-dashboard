<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassidy Paving — Operations Dashboard</title>
<style>
  :root{
    --bg-1:#0a0e14;--bg-2:#141c28;--bg-3:#1a1a1a;
    --red:#CC0000;--red-glow:rgba(204,0,0,0.4);--red-soft:rgba(204,0,0,0.12);
    --blue:#4ea8ff;--blue-glow:rgba(78,168,255,0.4);--blue-soft:rgba(78,168,255,0.12);
    --gold:#ffd700;--gold-soft:rgba(255,215,0,0.12);--gold-edge:rgba(255,200,0,0.35);
    --green:#3ddc91;--ok:#3ddc91;--warn:#ffb13b;--bad:#ff5b5b;
    --txt:#fff;--mute:#aaa;--dim:#777;
    --card-bg:rgba(255,255,255,0.025);--card-bd:rgba(255,255,255,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 40%,var(--bg-3) 100%);
    color:var(--txt);min-height:100vh;padding:18px 24px;overflow-x:hidden;
  }
  .header{display:flex;align-items:center;justify-content:center;gap:25px;
    padding-bottom:14px;position:relative;margin-bottom:18px}
  .header::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent 5%,var(--red) 30%,#ff3333 50%,var(--red) 70%,transparent 95%);
    box-shadow:0 0 15px var(--red-glow);
  }
  .logo{height:60px;filter:drop-shadow(0 0 8px rgba(204,0,0,0.3))}
  .hdiv{width:3px;height:46px;background:var(--red);border-radius:2px}
  .htxt h1{font-size:2rem;font-weight:800;letter-spacing:3px;color:#fff;line-height:1}
  .htxt h1 span{color:var(--red)}
  .htxt p{font-size:0.78rem;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-top:5px}
  .asof{position:absolute;right:0;top:6px;text-align:right;font-size:0.65rem;color:var(--dim);letter-spacing:1px}
  .asof b{color:var(--mute);font-weight:600}

  .kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
  .kpi-card{
    background:linear-gradient(135deg,var(--red-soft),rgba(30,5,5,0.5));
    backdrop-filter:blur(12px);
    border:1px solid rgba(204,0,0,0.35);border-radius:14px;
    padding:13px 14px 11px;position:relative;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06),0 0 14px rgba(204,0,0,0.08);
    animation:breathe 4.5s ease-in-out infinite;
  }
  .kpi-card.blue{background:linear-gradient(135deg,var(--blue-soft),rgba(5,15,30,0.5));border-color:rgba(78,168,255,0.35);box-shadow:0 4px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06),0 0 14px rgba(78,168,255,0.08)}
  .kpi-card.gold{background:linear-gradient(135deg,var(--gold-soft),rgba(40,30,0,0.5));border-color:var(--gold-edge);box-shadow:0 4px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06),0 0 14px rgba(255,200,0,0.08)}
  .kpi-card.green{background:linear-gradient(135deg,rgba(61,220,145,0.10),rgba(5,30,15,0.5));border-color:rgba(61,220,145,0.35)}
  @keyframes breathe{
    0%,100%{box-shadow:0 4px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.06),0 0 14px rgba(204,0,0,0.08)}
    50%{box-shadow:0 4px 20px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.10),0 0 28px rgba(204,0,0,0.20)}
  }
  .kpi-label{font-size:0.58rem;color:var(--mute);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
  .kpi-value{font-size:1.7rem;font-weight:800;color:#fff;text-shadow:0 0 12px var(--red-glow);line-height:1.05;letter-spacing:0.5px}
  .kpi-card.blue .kpi-value{text-shadow:0 0 12px var(--blue-glow)}
  .kpi-card.gold .kpi-value{color:var(--gold);text-shadow:0 0 12px rgba(255,200,0,0.4)}
  .kpi-card.green .kpi-value{color:var(--green);text-shadow:0 0 12px rgba(61,220,145,0.4)}
  .kpi-sub{font-size:0.68rem;color:var(--mute);margin-top:4px;line-height:1.3}
  .kpi-sub b{color:#fff;font-weight:600}
  .kpi-delta{font-size:0.7rem;font-weight:700;margin-top:3px}
  .kpi-delta.up{color:var(--ok)}.kpi-delta.down{color:var(--bad)}.kpi-delta.flat{color:var(--mute)}

  .mid-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-bottom:18px}
  .panel{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:14px;padding:14px 16px 12px;backdrop-filter:blur(8px)}
  .panel-title{font-size:0.78rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:#fff;border-bottom:2px solid rgba(204,0,0,0.3);padding-bottom:7px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center}
  .panel-title small{font-size:0.6rem;color:var(--dim);font-weight:500;letter-spacing:1.5px}

  /* CREW UTIL GRID */
  table.util{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:0.78rem}
  .util th{font-size:0.58rem;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:1.5px;
    padding:5px 6px;text-align:center}
  .util th.crew-h{text-align:left;width:120px}
  .util td.crew-name{padding:8px 10px;font-weight:700;color:#fff;letter-spacing:0.5px;
    background:rgba(255,255,255,0.025);border-radius:8px 0 0 8px;width:120px}
  .util-cell{
    padding:6px 8px;background:rgba(255,255,255,0.02);text-align:center;border-left:1px solid rgba(255,255,255,0.04);
  }
  .util-cell:last-child{border-radius:0 8px 8px 0}
  .util-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
  .util-bar{
    width:100%;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden;position:relative;
  }
  .util-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--green),#5cffaf);border-radius:5px;
  }
  .util-bar-fill.hot{background:linear-gradient(90deg,var(--warn),#ff8c1a)}
  .util-bar-fill.over{background:linear-gradient(90deg,var(--bad),#ff7575);box-shadow:0 0 8px rgba(255,90,90,0.4)}
  .util-bar-fill.low{background:linear-gradient(90deg,var(--blue),#84beff)}
  .util-meta{font-size:0.65rem;color:#fff;font-weight:700;margin-top:1px}
  .util-meta .lost{color:var(--warn);margin-left:6px;font-weight:500}
  .util-meta .lost.bad{color:var(--bad)}

  /* JOBS BEHIND */
  .behind-list{display:flex;flex-direction:column;gap:5px}
  .behind-row{
    display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
    padding:8px 10px;background:rgba(255,90,90,0.05);border-radius:7px;border-left:2px solid var(--warn);
  }
  .behind-row.hot{background:rgba(255,90,90,0.10);border-left-color:var(--bad)}
  .behind-row.extreme{background:rgba(255,90,90,0.18);border-left-color:#ff2929;box-shadow:0 0 12px rgba(255,90,90,0.15)}
  .behind-job{font-size:0.7rem;color:var(--mute);font-family:'Consolas',monospace}
  .behind-co{font-size:0.78rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .behind-sub{font-size:0.62rem;color:var(--dim);margin-top:1px}
  .behind-days{font-size:0.95rem;color:var(--bad);font-weight:800;text-align:right;white-space:nowrap;text-shadow:0 0 6px rgba(255,90,90,0.4)}
  .behind-days .lbl{font-size:0.55rem;font-weight:500;color:var(--mute);letter-spacing:1px;display:block}

  /* BOTTOM GRID */
  .bot-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:18px}

  /* TONS CHART */
  .tons-chart{height:240px;position:relative;padding:6px 4px 24px 36px}
  .chart-svg{width:100%;height:100%}
  .chart-grid{stroke:rgba(255,255,255,0.05);stroke-width:1}
  .chart-bar-tons{fill:rgba(255,200,0,0.55)}
  .chart-line-tonsLY{stroke:rgba(255,255,255,0.35);stroke-width:1.5;stroke-dasharray:4 4;fill:none}
  .chart-label{fill:var(--mute);font-size:9px;font-family:Segoe UI}
  .chart-legend{display:flex;gap:14px;justify-content:flex-end;font-size:0.65rem;color:var(--mute)}
  .chart-legend span{display:inline-flex;align-items:center;gap:5px}
  .leg-swatch{display:inline-block;width:12px;height:3px;vertical-align:middle}
  .leg-swatch.tons{background:rgba(255,200,0,0.55);height:8px}
  .leg-swatch.tonsLY{background:rgba(255,255,255,0.35);border-top:1px dashed #fff;border-bottom:1px dashed #fff;height:5px}

  /* CNB BUCKETS */
  .cnb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
  .cnb-bucket{
    background:linear-gradient(135deg,rgba(78,168,255,0.10),rgba(5,15,30,0.4));
    border:1px solid rgba(78,168,255,0.30);border-radius:10px;padding:10px 8px;text-align:center;
  }
  .cnb-bucket.warn{border-color:rgba(255,200,0,0.35);background:linear-gradient(135deg,rgba(255,200,0,0.12),rgba(40,30,0,0.4))}
  .cnb-bucket.bad{border-color:rgba(255,90,90,0.4);background:linear-gradient(135deg,rgba(255,90,90,0.14),rgba(30,5,5,0.5))}
  .cnb-name{font-size:0.6rem;color:var(--mute);letter-spacing:1.5px;text-transform:uppercase}
  .cnb-count{font-size:1.6rem;font-weight:800;color:#fff;margin-top:3px}
  .cnb-amount{font-size:0.72rem;color:var(--mute);margin-top:2px;font-weight:600}
  .cnb-bucket.bad .cnb-count{color:#ff8c8c}

  /* BILLING TOTALS */
  .bill-totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:0.72rem}
  .bt-cell{background:rgba(255,255,255,0.03);border-radius:6px;padding:7px 9px;text-align:center;border:1px solid rgba(255,255,255,0.05)}
  .bt-name{font-size:0.55rem;color:var(--mute);letter-spacing:1px;text-transform:uppercase}
  .bt-amt{font-size:0.95rem;font-weight:700;color:#fff;margin-top:2px}

  /* STATUS BAR */
  .status-bar{display:flex;gap:10px;flex-wrap:wrap}
  .status-pill{
    padding:6px 12px;border-radius:20px;font-size:0.7rem;font-weight:700;
    background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    letter-spacing:1px;
  }
  .status-pill .c{color:var(--mute);font-weight:500;margin-right:6px;text-transform:uppercase;font-size:0.6rem}
  .status-pill.scheduled{border-color:rgba(78,168,255,0.4)}
  .status-pill.in-progress{border-color:rgba(255,200,0,0.5);background:rgba(255,200,0,0.08)}
  .status-pill.complete{border-color:rgba(61,220,145,0.4);background:rgba(61,220,145,0.05)}
  .status-pill.weather-hold{border-color:rgba(78,168,255,0.4);background:rgba(78,168,255,0.08)}
  .status-pill.material-hold{border-color:rgba(255,90,90,0.4);background:rgba(255,90,90,0.05)}
  .status-pill.unscheduled{border-color:rgba(170,170,170,0.3)}
  .status-pill.cancelled{border-color:rgba(170,170,170,0.2);opacity:0.6}

  .loading{padding:30px;text-align:center;color:var(--dim);letter-spacing:2px}
  .warn-strip{margin-bottom:14px;padding:8px 14px;background:rgba(255,200,0,0.08);
    border:1px solid var(--gold-edge);border-radius:8px;font-size:0.72rem;color:var(--gold);letter-spacing:1px}
</style>
</head>
<body>

<div class="header">
  <img class="logo" src="logo.png" alt="Cassidy Paving">
  <div class="hdiv"></div>
  <div class="htxt">
    <h1>OPERATIONS <span>DASHBOARD</span></h1>
    <p>Mike &middot; Live from Smartsheet</p>
  </div>
  <div class="asof" id="asof"></div>
</div>

<div id="warn-strip-container"></div>
<div id="content"><div class="loading">Loading ops data&hellip;</div></div>

<script>
const fmt$K = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (Math.abs(n) >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + Math.round(n).toLocaleString();
};
const fmtPct = n => n == null ? '—' : n.toFixed(0) + '%';
const fmtPctD = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
const fmtNum = n => n == null ? '—' : Math.round(n).toLocaleString();
const fmtT = n => n == null ? '—' : Math.round(n).toLocaleString() + ' T';

function deltaPctClass(d){ if (d == null) return 'flat'; if (d > 2) return 'up'; if (d < -2) return 'down'; return 'flat'; }
function deltaArrow(d){ if (d == null) return ''; if (d > 2) return '▲'; if (d < -2) return '▼'; return '—'; }

function relativeAge(ts){
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  const m = Math.round((now - d)/60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  if (m < 1440) return Math.round(m/60) + 'h ago';
  return Math.round(m/1440) + 'd ago';
}

function utilColorClass(scheduled, capacity){
  if (capacity === 0) return 'low';
  const pct = scheduled / capacity;
  if (pct >= 1.2) return 'over';
  if (pct >= 0.9) return 'hot';
  if (pct >= 0.5) return '';
  return 'low';
}

function render(d){
  document.getElementById('asof').innerHTML =
    `<div><b>Updated</b> ${relativeAge(d.generatedAt)}</div><div>${d.asOf.today}</div>`;

  const warns = [];
  if (d.kpis.tonsMTD.value === 0 && d.kpis.tonsMTD.priorMonth === 0){
    warns.push('Tons MTD & prior month = 0 — confirm <b>Asphalt Tons</b> is being entered on Operations Schedule rows.');
  }
  if (d.kpis.holdsMTD.total === 0){
    // Probably fine, but if a rainy month and 0 weather holds, something is off
  }
  if (warns.length){
    document.getElementById('warn-strip-container').innerHTML =
      '<div class="warn-strip">⚠ ' + warns.join('  &nbsp;&middot;&nbsp;  ') + '</div>';
  }

  const k = d.kpis;
  const tonsDelta = k.tonsMTD.priorMonth > 0 ? ((k.tonsMTD.value - k.tonsMTD.priorMonth) / k.tonsMTD.priorMonth * 100) : null;
  const syDelta = k.syMTD.priorMonth > 0 ? ((k.syMTD.value - k.syMTD.priorMonth) / k.syMTD.priorMonth * 100) : null;
  const utilOver = k.crewUtilThisWeek.pct != null && k.crewUtilThisWeek.pct > 100;

  const kpiHTML = `
    <div class="kpi-strip">
      <div class="kpi-card ${utilOver ? '' : 'green'}">
        <div class="kpi-label">Crew Util · This Week</div>
        <div class="kpi-value">${fmtPct(k.crewUtilThisWeek.pct)}</div>
        <div class="kpi-sub"><b>${k.crewUtilThisWeek.scheduledDays}</b> sched / <b>${k.crewUtilThisWeek.availableDays}</b> cap</div>
        ${utilOver ? '<div class="kpi-delta down">▲ over capacity</div>' : ''}
      </div>
      <div class="kpi-card gold">
        <div class="kpi-label">Tons MTD</div>
        <div class="kpi-value">${fmtT(k.tonsMTD.value)}</div>
        <div class="kpi-sub">prior month <b>${fmtT(k.tonsMTD.priorMonth)}</b></div>
        <div class="kpi-delta ${deltaPctClass(tonsDelta)}">${deltaArrow(tonsDelta)} ${tonsDelta != null ? fmtPctD(tonsDelta) : ''}</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Square Yards MTD</div>
        <div class="kpi-value">${fmtNum(k.syMTD.value)}</div>
        <div class="kpi-sub">prior month <b>${fmtNum(k.syMTD.priorMonth)}</b></div>
        <div class="kpi-delta ${deltaPctClass(syDelta)}">${deltaArrow(syDelta)} ${syDelta != null ? fmtPctD(syDelta) : ''}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">7-Day Slip</div>
        <div class="kpi-value">${k.slip7d.completed}/${k.slip7d.scheduled}</div>
        <div class="kpi-sub">completed / scheduled</div>
      </div>
      <div class="kpi-card ${k.holdsMTD.total > 5 ? '' : 'blue'}">
        <div class="kpi-label">Holds MTD</div>
        <div class="kpi-value">${k.holdsMTD.total}</div>
        <div class="kpi-sub"><b>${k.holdsMTD.weather}</b> weather · <b>${k.holdsMTD.material}</b> material</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Revenue in Progress</div>
        <div class="kpi-value">${fmt$K(k.revenueInProgress.amount)}</div>
        <div class="kpi-sub">scheduled / in-progress, not yet billed</div>
      </div>
    </div>`;

  // Crew util grid
  const weekLabels = d.crewUtilGrid[0].weeks.map(w => {
    const dt = new Date(w.weekStart);
    return `Week of ${dt.getMonth()+1}/${dt.getDate()}`;
  });
  const utilHeader = `<tr><th class="crew-h">Crew</th>${weekLabels.map(l => `<th>${l}</th>`).join('')}</tr>`;
  const utilRows = d.crewUtilGrid.map(row => {
    const cells = row.weeks.map(w => {
      const cap = w.capacity || 1;
      const pct = (w.scheduled / cap) * 100;
      const cls = utilColorClass(w.scheduled, cap);
      const fill = Math.min(100, pct);
      const lostStr = (w.weatherLost + w.materialLost) > 0
        ? `<span class="lost ${w.materialLost > 0 ? 'bad' : ''}">−${w.weatherLost + w.materialLost}d</span>`
        : '';
      return `<td class="util-cell">
        <div class="util-bar-wrap">
          <div class="util-bar"><div class="util-bar-fill ${cls}" style="width:${fill}%"></div></div>
          <div class="util-meta">${w.scheduled}/${cap} ${lostStr}</div>
        </div>
      </td>`;
    }).join('');
    return `<tr><td class="crew-name">${row.crew}</td>${cells}</tr>`;
  }).join('');

  // Jobs behind
  const behindHTML = d.jobsBehind.length ? d.jobsBehind.map(j => {
    const cls = j.varianceDays > 30 ? 'extreme' : (j.varianceDays > 7 ? 'hot' : '');
    return `<div class="behind-row ${cls}">
      <div class="behind-job">${j.jobNum}</div>
      <div>
        <div class="behind-co">${j.company || '(no company)'}</div>
        <div class="behind-sub">${j.phase || ''} ${j.city ? '· ' + j.city : ''} ${j.pm ? '· PM: ' + j.pm : ''}</div>
      </div>
      <div class="behind-days">${j.varianceDays}<div class="lbl">days behind</div></div>
    </div>`;
  }).join('') : '<div style="color:#666;text-align:center;padding:20px;font-size:0.75rem">No jobs behind — all on schedule</div>';

  // CNB buckets
  const cnbHTML = d.completedNotBilled.map(b => {
    const cls = b.bucket === '30+ days' ? 'bad' : (b.bucket === '15-30 days' ? 'warn' : '');
    return `<div class="cnb-bucket ${cls}">
      <div class="cnb-name">${b.bucket}</div>
      <div class="cnb-count">${b.count}</div>
      <div class="cnb-amount">${fmt$K(b.amount)}</div>
    </div>`;
  }).join('');

  const bt = d.billingTotals;
  const btHTML = `
    <div class="bill-totals">
      <div class="bt-cell"><div class="bt-name">Ready to Invoice</div><div class="bt-amt">${fmt$K(bt.readyToInvoice)}</div></div>
      <div class="bt-cell"><div class="bt-name">Invoiced</div><div class="bt-amt">${fmt$K(bt.invoiced)}</div></div>
      <div class="bt-cell"><div class="bt-name">Paid in Full</div><div class="bt-amt">${fmt$K(bt.paidInFull)}</div></div>
      <div class="bt-cell"><div class="bt-name">Overdue Balance</div><div class="bt-amt">${fmt$K(bt.overdueBalance)}</div></div>
    </div>`;

  // Status pills
  const statusHTML = Object.entries(d.statusCounts || {})
    .filter(([k, v]) => k && v > 0)
    .map(([k, v]) => {
      const cls = k.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z-]/g, '');
      return `<div class="status-pill ${cls}"><span class="c">${k}</span><span>${v}</span></div>`;
    }).join('');

  document.getElementById('content').innerHTML = kpiHTML + `
    <div class="mid-grid">
      <div class="panel">
        <div class="panel-title">Crew Utilization Grid <small>this week + next 2 · days lost shown in amber/red</small></div>
        <table class="util">
          <thead>${utilHeader}</thead>
          <tbody>${utilRows}</tbody>
        </table>
      </div>
      <div class="panel">
        <div class="panel-title">Jobs Behind Schedule <small>top 10 by days behind</small></div>
        <div class="behind-list">${behindHTML}</div>
      </div>
    </div>
    <div class="bot-grid">
      <div class="panel">
        <div class="panel-title">Tons Placed — Last 13 Weeks
          <div class="chart-legend">
            <span><span class="leg-swatch tons"></span>Tons</span>
            <span><span class="leg-swatch tonsLY"></span>LY</span>
          </div>
        </div>
        <div class="tons-chart">${renderTonsChart(d.tonsWeekly)}</div>
      </div>
      <div class="panel">
        <div class="panel-title">Completed Not Billed <small>aging buckets</small></div>
        <div class="cnb-grid">${cnbHTML}</div>
        ${btHTML}
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Ops Schedule Status Mix</div>
      <div class="status-bar">${statusHTML}</div>
    </div>
  `;
}

function renderTonsChart(series){
  if (!series || !series.length) return '<div style="text-align:center;color:#666;padding:30px">No data</div>';
  const W = 600, H = 220, PAD_L = 36, PAD_R = 12, PAD_T = 10, PAD_B = 28;
  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
  const maxV = Math.max(1, ...series.map(s => Math.max(s.tons, s.tonsLY)));
  const niceMax = Math.ceil(maxV / 1000) * 1000 || maxV;
  const xStep = innerW / series.length;
  const xCenter = i => PAD_L + xStep * (i + 0.5);
  const y = v => PAD_T + innerH - (v / niceMax) * innerH;

  const gridY = [];
  for (let i = 0; i <= 4; i++){
    const v = (niceMax / 4) * i;
    const yp = y(v);
    gridY.push(`<line class="chart-grid" x1="${PAD_L}" x2="${W - PAD_R}" y1="${yp}" y2="${yp}"/>`);
    gridY.push(`<text class="chart-label" x="${PAD_L - 4}" y="${yp+3}" text-anchor="end">${Math.round(v).toLocaleString()}T</text>`);
  }
  const xLabels = series.map((s, i) => {
    if (i % 2 !== 0 && i !== series.length - 1) return '';
    const d = new Date(s.weekStart);
    return `<text class="chart-label" x="${xCenter(i)}" y="${H - 8}" text-anchor="middle">${(d.getMonth()+1)}/${d.getDate()}</text>`;
  }).join('');

  const barW = Math.max(8, xStep * 0.65);
  const bars = series.map((s, i) => {
    const h = (s.tons / niceMax) * innerH;
    return `<rect class="chart-bar-tons" x="${xCenter(i) - barW/2}" y="${y(s.tons)}" width="${barW}" height="${h}" rx="2"/>`;
  }).join('');
  const lyPath = series.map((s, i) => `${i===0?'M':'L'}${xCenter(i)} ${y(s.tonsLY)}`).join(' ');

  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
    ${gridY.join('')}${bars}
    <path class="chart-line-tonsLY" d="${lyPath}"/>
    ${xLabels}
  </svg>`;
}

async function load(){
  try{
    const r = await fetch('data.json?cb=' + Math.floor(Date.now()/60000));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    render(await r.json());
  } catch(e){
    document.getElementById('content').innerHTML = '<div class="loading">Failed to load data: ' + e.message + '</div>';
  }
}
load();
setInterval(load, 60000);
</script>
